<html>
<head>
    <title>Employee Management</title>
</head>
<body>
    <h1>Employee List</h1>
    <div class="upload-zone">
        <h2>Drag and Drop Upload Zone</h2>
        <p>Drag your files here to upload</p>
        <input type="file" id="fileUpload" multiple accept="*/*" style="display:none;" />
    </div>
    <script>
        const dropArea = document.querySelector('.upload-zone');

        dropArea.addEventListener('dragover', (event) => {
            event.preventDefault();
            dropArea.classList.add('active');
        });

        dropArea.addEventListener('dragleave', () => {
            dropArea.classList.remove('active');
        });

        dropArea.addEventListener('drop', (event) => {
            event.preventDefault();
            const files = event.dataTransfer.files;
            console.log(files);
            // Further processing of files (uploading, etc.)
        });
    </script>
</body>
</html>
