<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Real Estate CRM Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<script src="lib/chart.min.js"></script>
</head>
<body>

<div class="container">
<h1>🏡 Real Estate CRM Dashboard</h1>

<div class="dashboard-cards">
  <div class="card">
    <h3>Total Staff</h3>
    <h2 id="staffCount">0</h2>
  </div>
  <div class="card">
    <h3>Total Agents</h3>
    <h2 id="agentCount">0</h2>
  </div>
  <div class="card">
    <h3>Total Properties</h3>
    <h2 id="propertyCount">0</h2>
  </div>
  <div class="card">
    <h3>Total Commission</h3>
    <h2 id="commissionTotal">₦0</h2>
  </div>
</div>

<div class="charts">
  <div>
    <h3>Agent Performance</h3>
    <canvas id="agentChart"></canvas>
  </div>
  <div>
    <h3>Top Agents</h3>
    <ul id="leaderboard"></ul>
  </div>
</div>

<nav>
  <a href="employees.html">Employees</a> |
  <a href="properties.html">Properties & Sales</a>
</nav>

<script src="js/main.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
